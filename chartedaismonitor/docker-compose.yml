services:
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ais
      POSTGRES_USER: ais_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      # Host backups / local tools only; not exposed on LAN/WAN
      - "127.0.0.1:5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ais_user -d ais"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chartedaismonitor-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ais_user:${POSTGRES_PASSWORD:-changeme}@db:5432/ais
    ports:
      # One mapping only (override files merge `ports` by appending — duplicate host ports fail).
      # Nginx on host: set BACKEND_HOST=127.0.0.1 in .env (see deploy/docker-compose.override.nginx.example.yml)
      - "${BACKEND_HOST:-0.0.0.0}:${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  # Enable with: COMPOSE_PROFILES=ais in .env or: docker compose --profile ais up -d
  ingest:
    profiles:
      - ais
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: chartedaismonitor-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ais_user:${POSTGRES_PASSWORD:-changeme}@db:5432/ais
    command: ["python", "scripts/ingest_aisstream.py"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST:-0.0.0.0}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
