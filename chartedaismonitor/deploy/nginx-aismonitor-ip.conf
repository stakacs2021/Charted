# Optional: single entrypoint on port 80 (HTTP) when you do not have a domain yet.
# 1. Bind Compose services to loopback only — copy docker-compose.override.nginx.example.yml
#    to docker-compose.override.yml, then: docker compose up -d --build
# 2. Set NEXT_PUBLIC_API_URL=http://YOUR_LAN_IP/api (no trailing slash), rebuild frontend.
# 3. sudo cp deploy/nginx-aismonitor-ip.conf /etc/nginx/sites-available/chartedaismonitor
#    sudo ln -sf /etc/nginx/sites-available/chartedaismonitor /etc/nginx/sites-enabled/
#    Replace YOUR_LAN_IP below if you use server_name (optional for default_server).
# 4. sudo nginx -t && sudo systemctl reload nginx
#
# Browse: http://YOUR_LAN_IP/  (frontend) — API calls go to /api/… on the same host.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
