# Nginx on the host should proxy to loopback only (not LAN/WAN on :3000 / :8000).
#
# Do NOT duplicate `ports:` here: Compose merges lists by APPENDING. The base
# `docker-compose.yml` already publishes backend/frontend; adding another
# `127.0.0.1:8000:8000` line binds host port 8000 twice → "address already in use".
#
# Instead set in `.env` (same directory as docker-compose.yml):
#   BACKEND_HOST=127.0.0.1
#   BACKEND_PORT=8000
#   FRONTEND_HOST=127.0.0.1
#   FRONTEND_PORT=3000
#
# Then: docker compose up -d --build
#
# This file can remain unused, or delete `docker-compose.override.yml` if you
# copied an older version that only repeated `ports:`.
